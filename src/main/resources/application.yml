server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/digital_twin_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

jwt:
  secret: digital-twin-secret-key-2026-very-long-and-secure-for-hmac-sha256
  expiration: 86400000   # 24h (ms)

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.digitaltwin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
